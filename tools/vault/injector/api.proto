syntax = "proto3";

package com.alwaldend.src.tools.vault.injector.injector_proto;

option go_package = "git.alwaldend.com/alwaldend/src/tools/vault/injector/injector_proto";

message File {
  string name = 1;
  string value = 2;
  string from_file = 6;
  repeated string secrets = 3;
  repeated string files = 4;
  repeated string vault_ops = 7;
  map<string, string> labels = 5;
}

message Env {
  string name = 1;
  string value = 2;
  repeated string secrets = 3;
  repeated string files = 4;
  repeated string vault_ops = 6;
  map<string, string> labels = 5;
}

message SecretKv {
  // Secret path
  string path = 1;
  // Secret mount
  string mount = 2;
}


message Secret {
  // Secret name
  string name = 1;
  // Vault name
  string vault = 2;
  // Auth name
  string auth = 3;
  // KV secret config
  SecretKv kv = 4;
  map<string, string> labels = 5;
}

message Op {
  string name = 1;
  string method = 2;
  string vault = 5;
  string auth = 6;
  string path = 3;
  map<string, string> data = 7;
  map<string, string> labels = 4;
}


message Config {
  // List of secret configs
  repeated Secret secrets = 3;
  // Vault operations
  repeated Op ops = 6;
  // Files to create
  repeated File files = 4;
  // Env to set
  repeated Env env = 5;
}
