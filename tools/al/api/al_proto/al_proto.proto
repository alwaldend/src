syntax = "proto3";

package com.alwaldend.src.tools.al.api.al_proto;

option go_package = "git.alwaldend.com/alwaldend/src/tools/al/api/al_proto";

// api.Config https://pkg.go.dev/github.com/hashicorp/vault/api#Config
message VaultConfig {
  string address = 1;
}

// api.ConfigureTLS https://pkg.go.dev/github.com/hashicorp/vault/api#Config.ConfigureTLS
message VaultTLS {
  string ca_cert = 1;
  string client_cert = 2;
  string client_key = 3;
}

message Vault {
  // Vault name
  string name = 1;
  // Vault config
  VaultConfig config = 2;
  // Vault tls config
  VaultTLS tls = 3;
}

message VaultSecretKv {
  // Secret path
  string path = 1;
  // Secret mount
  string mount = 2;
}

message File {
  string name = 1;
  string value = 2;
  string from_file = 6;
  repeated string secrets = 3;
  repeated string files = 4;
  repeated string vault_ops = 7;
  map<string, string> labels = 5;
}

message Env {
  string name = 1;
  string value = 2;
  repeated string secrets = 3;
  repeated string files = 4;
  repeated string vault_ops = 6;
  map<string, string> labels = 5;
}

message VaultSecret {
  // Secret name
  string name = 1;
  // Vault name
  string vault = 2;
  // Auth name
  string auth = 3;
  // KV secret config
  VaultSecretKv kv = 4;
  map<string, string> labels = 5;
}

// Approle auth
message VaultAuthApprole {
  // Approle name
  string name = 1;
}

message VaultAuthTokenHelper {}

// Vault authentication config
message VaultAuth {
  // Authentication name
  string name = 1;
  // Authentification with approle
  VaultAuthApprole approle = 2;
  // Authentification using the token helper
  VaultAuthTokenHelper token_helper = 3;
  bool no_auth = 4;
}

message VaultOp {
  string name = 1;
  string method = 2;
  string vault = 5;
  string auth = 6;
  string path = 3;
  map<string, string> data = 7;
  map<string, string> labels = 4;
}

message Config {
  // List of Vault configs
  repeated Vault vaults = 1;
  // List of Vault authentication configs
  repeated VaultAuth auth = 2;
  // List of secret configs
  repeated VaultSecret secrets = 3;
  // Vault operations
  repeated VaultOp vault_ops = 6;
  // Files to create
  repeated File files = 4;
  // Env to set
  repeated Env env = 5;
}

message PluginConfig {}

message PluginStartRequest {
  Config config = 1;
  PluginConfig service = 2;
}
message PluginStartResponse {
  map<string, string> env = 1;
}

service PluginService {
  rpc PluginStart(PluginStartRequest) returns (PluginStartResponse) {}
}
