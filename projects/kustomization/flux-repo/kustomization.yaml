apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-git-src.yaml
  - flux-git-src-secret.yaml
  - flux-sops-secret.yaml
  - flux-helm-alwaldend.yaml
secretGenerator:
  - name: flux-helm-alwaldend-ca
    options:
      disableNameSuffixHash: true
    files:
      - ca.crt=../../../vault/tf/output/pki_ca_servers.crt
