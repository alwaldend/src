---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault
spec:
  vault:
    path: pki/ica_servers/issuer/default/sign/ROLE_NAME
    server: https://vault.alwaldend.com:8200
    caBundleSecretRef:
      key: ca.crt
      name: cert-manager-vault-ca
    auth:
      appRole:
        path: approle
        roleId: ROLE_NAME
        secretRef:
          name: cert-manager-vault-approle
          key: secretId
---
