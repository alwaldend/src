syntax = "proto3";

package com.alwaldend.src.projects.al.api.al_proto;

option go_package = "git.alwaldend.com/alwaldend/src/projects/al/api/al_proto";

// api.Config https://pkg.go.dev/github.com/hashicorp/vault/api#Config
message VaultConfig {
  string address = 1;
}

// api.ConfigureTLS https://pkg.go.dev/github.com/hashicorp/vault/api#Config.ConfigureTLS
message VaultTLS {
  string ca_cert = 1;
  string client_cert = 2;
  string client_key = 3;
}

message VaultConn {
  // Vault name
  string name = 1;
  // Vault config
  VaultConfig config = 2;
  // Vault tls config
  VaultTLS tls = 3;
}

// Approle auth
message VaultAuthApprole {
  // Approle name
  string name = 1;
}

message VaultAuthTokenHelper {}

// Vault authentication config
message VaultAuth {
  // Authentication name
  string name = 1;
  // Authentification with approle
  VaultAuthApprole approle = 2;
  // Authentification using the token helper
  VaultAuthTokenHelper token_helper = 3;
  bool no_auth = 4;
}

message Config {
  // List of Vault configs
  repeated VaultConn vault_conn = 1;
  // List of Vault authentication configs
  repeated VaultAuth vault_auth = 2;
  // Plugin configs
  repeated PluginConfig plugins = 7;
  // Plugin call configs
  repeated PluginCall plugin_calls = 8;
}

message JsonMap {
  map<string, Json> val = 1;
}

message JsonList {
  repeated Json val = 1;
}

message Json {
  oneof val {
    string val_string = 2;
    bool val_bool = 3;
    int64 val_int64 = 4;
    JsonMap val_map = 5;
    JsonList val_list = 6;
  }
}

message PluginCall {
  // Request name
  string name = 1;
  // Plugin name
  string plugin = 2;
  // Plugin data
  Json data = 3;
  map<string, string> labels = 4;
}

message PluginConfig {
  string name = 1;
  string bin = 2;
  repeated string args = 3;
  map<string, string> env = 4;
  Json data = 5;
  map<string, string> labels = 6;
  repeated PluginCall calls = 7;
}

service PluginService {
  rpc PluginStart(PluginStartRequest) returns (PluginStartResponse) {}
}

message PluginStartRequest {
  // Whole config
  Config config = 1;
  // Plugin config
  PluginConfig plugin = 2;
  // Plugin requests
  repeated PluginCall calls = 3;
}
message PluginStartResponse {
  // Environment variables
  map<string, string> env = 1;
}
