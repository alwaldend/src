- tags:
    - traefik
  block:
    - name: Create traefik user
      ansible.builtin.user:
        name: "{{ traefik_user }}"
        uid: "{{ traefik_user_uid }}"
        shell: /sbin/nologin
        home: "{{ traefik_dir }}/home"
        system: true
    - name: Create filesystem on the traefik disk
      when: traefik_disk is truthy
      community.general.filesystem:
        fstype: ext4
        dev: "{{ traefik_disk }}"
    - name: Mount traefik disk
      when: traefik_disk is truthy
      ansible.posix.mount:
        path: "{{ traefik_dir }}"
        src: "{{ traefik_disk }}"
        fstype: ext4
        state: mounted
    - name: Create traefik dirs
      loop:
        - "{{ traefik_dir }}"
        - "{{ traefik_data_dir }}"
        - "{{ traefik_config_dir }}"
        - "{{ traefik_log_dir }}"
      ansible.builtin.file:
        state: directory
        owner: "{{ traefik_user }}"
        group: "{{ traefik_user }}"
        mode: "0700"
        path: "{{ item }}"
    - name: Copy the traefik binary
      register: traefik_bin_var
      ansible.builtin.copy:
        src: "{{ traefik_bin_local_path }}"
        dest: "{{ traefik_bin_path }}"
        owner: "root"
        group: "{{ traefik_user }}"
        mode: "0755"
    - name: Generate the eab
      connection: local
      register: traefik_eab_result
      environment:
        VAULT_ADDR: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') }}"
        VAULT_CACERT: "{{ lookup('ansible.builtin.env', 'VAULT_CACERT') }}"
        VAULT_CLIENT_KEY: "{{ lookup('ansible.builtin.env', 'VAULT_CLIENT_KEY') }}"
        VAULT_CLIENT_CERT: "{{ lookup('ansible.builtin.env', 'VAULT_CLIENT_CERT') }}"
        VAULT_TOKEN: "{{ lookup('ansible.builtin.env', 'VAULT_TOKEN') }}"
        VAULT_SKIP_VERIFY: "{{ lookup('ansible.builtin.env', 'VAULT_SKIP_VERIFY') }}"
      ansible.builtin.command:
        argv:
          - "{{ traefik_vault_bin_local_path }}"
          - write
          - -format=json
          - --force
          - "{{ traefik_acme_path }}/new-eab"
    - name: Write the config
      register: traefik_config_var
      vars:
        traefik_acme_data: "{{ (traefik_eab_result.stdout | from_json).data }}"
        traefik_acme_kid: "{{ traefik_acme_data.id }}"
        traefik_acme_hmac: "{{ traefik_acme_data.key }}"
        traefik_acme_hmac_encoded: "{{ traefik_acme_data.key | b64encode }}"
      ansible.builtin.template:
        src: "{{ traefik_config_local_path }}"
        dest: "{{ traefik_config_path }}"
        owner: "root"
        group: "{{ traefik_user }}"
        mode: "0650"
    - name: Write the dynamic config
      ansible.builtin.template:
        src: "{{ traefik_dynamic_config_local_path }}"
        dest: "{{ traefik_dynamic_config_path }}"
        owner: "root"
        group: "{{ traefik_user }}"
        mode: "0650"
    - name: Write the service
      register: traefik_service_var
      ansible.builtin.template:
        src: systemd_service.conf
        dest: "{{ traefik_service_path }}"
        owner: root
        group: root
        mode: 644
    - name: Ensure the daemon is reloaded
      when: traefik_service_var.changed
      ansible.builtin.systemd_service:
        daemon_reload: true
    - name: Restart the service
      when: >-
        traefik_service_var.changed
        or traefik_config_var.changed or traefik_bin_var.changed
        or traefik_tls_client_ca_file_path_var.changed
      ansible.builtin.systemd_service:
        name: "{{ traefik_service_path | basename }}"
        state: reloaded
    - name: Start the service and enable
      ansible.builtin.systemd_service:
        name: "{{ traefik_service_path | basename }}"
        enabled: true
        state: started
