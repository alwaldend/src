- name: Main
  tags:
    - k3s
  block:
    - name: Install packages
      ansible.builtin.package:
        name:
          - fuse
          - fuse-libs
          - curl
    - name: Create filesystems
      loop:
        - "{{ k3s_storage_disk }}"
        - "{{ k3s_data_disk }}"
      community.general.filesystem:
        resizefs: true
        fstype: ext4
        dev: "{{ item }}"
    - name: Mount filesystems
      loop:
        - path: "{{ k3s_storage_dir }}"
          src: "{{ k3s_storage_disk }}"
        - path: "{{ k3s_data_dir }}"
          src: "{{ k3s_data_disk }}"
      ansible.posix.mount:
        path: "{{ item.path }}"
        src: "{{ item.src }}"
        fstype: ext4
        state: mounted
    - name: Create k3s dirs
      loop:
        - "{{ k3s_data_dir }}"
        - "{{ k3s_storage_dir }}"
        - "{{ k3s_config_path | dirname }}"
        - "{{ k3s_manifests_path | dirname }}"
        - "{{ k3s_admission_config_path | dirname }}"
        - "{{ k3s_auth_config_path | dirname }}"
      ansible.builtin.file:
        state: directory
        owner: "root"
        group: "root"
        mode: "0700"
        path: "{{ item }}"
    - name: Write configs
      loop:
        - src: "{{ k3s_config_local_path }}"
          dest: "{{ k3s_config_path }}"
        - src: "{{ k3s_manifests_local_path }}"
          dest: "{{ k3s_manifests_path }}"
        - src: "{{ k3s_auth_config_local_path }}"
          dest: "{{ k3s_auth_config_path }}"
        - src: "{{ k3s_admission_config_local_path }}"
          dest: "{{ k3s_admission_config_path }}"
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "0600"
    - name: Copy binaries
      loop:
        - src: "{{ k3s_bin_local_path }}"
          dest: "{{ k3s_bin_path }}"
        - src: "{{ k3s_install_script_local_path }}"
          dest: "{{ k3s_install_script_path }}"
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "0755"
    - name: Run install script
      environment:
        INSTALL_K3S_SKIP_DOWNLOAD: "true"
      ansible.builtin.command:
        cmd: "{{ k3s_install_script_path }}"
    - name: Ensure k3s service is started and enabled
      ansible.builtin.systemd_service:
        name: "{{ k3s_service_name }}"
        enabled: true
        state: started
