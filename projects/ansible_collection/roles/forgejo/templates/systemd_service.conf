[Unit]
Description=Forgejo (Beyond coding. We forge.)
After=syslog.target
After=network.target

[Service]
LimitNOFILE=524288:524288
RestartSec=2s
Type=notify
User={{ forgejo_user }}
Group={{ forgejo_user }}
WorkingDirectory={{ forgejo_work_dir }}
ExecStart={{ forgejo_bin_path }} web --config {{ forgejo_config_path }}
ExecReload=/bin/kill --signal HUP $MAINPID
Restart=always

[Install]
WantedBy=multi-user.target
