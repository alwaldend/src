- tags:
    - forgejo
  block:
    - name: Install packages
      ansible.builtin.package:
        name:
          - git
          - git-lfs
    - name: Create forgejo user
      ansible.builtin.user:
        name: "{{ forgejo_user }}"
        uid: "{{ forgejo_user_uid }}"
        shell: /sbin/nologin
        home: "{{ forgejo_dir }}/home"
        system: true
    - name: Create forgejo dirs
      loop:
        - "{{ forgejo_dir }}"
        - "{{ forgejo_data_dir }}"
        - "{{ forgejo_config_dir }}"
        - "{{ forgejo_work_dir }}"
        - "{{ forgejo_log_dir }}"
      ansible.builtin.file:
        state: directory
        owner: "{{ forgejo_user }}"
        group: "{{ forgejo_user }}"
        mode: "0700"
        path: "{{ item }}"
    - name: Copy the forgejo binary
      register: forgejo_bin_var
      ansible.builtin.copy:
        src: "{{ forgejo_bin_local_path }}"
        dest: "{{ forgejo_bin_path }}"
        owner: "root"
        group: "{{ forgejo_user }}"
        mode: "0755"
    - name: Copy the config
      ansible.builtin.template:
        src: "{{ forgejo_config_local_path }}"
        dest: "{{ forgejo_config_path }}"
        owner: "{{ forgejo_user }}"
        group: "{{ forgejo_user }}"
        mode: "0600"
    - name: Write the service
      register: forgejo_service_result
      ansible.builtin.template:
        src: systemd_service.conf
        dest: "{{ forgejo_service_path }}"
        owner: root
        group: root
        mode: 644
    - name: Ensure the daemon is reloaded
      when: forgejo_service_result.changed
      ansible.builtin.systemd_service:
        daemon_reload: true
    - name: Start the service and enable
      register: forgejo_service_started_result
      ansible.builtin.systemd_service:
        name: "{{ forgejo_service_path | basename }}"
        enabled: true
        state: started
    - name: Reload the service
      when: not forgejo_service_started_result.changed
      ansible.builtin.systemd_service:
        name: "{{ forgejo_service_path | basename }}"
        state: reloaded
