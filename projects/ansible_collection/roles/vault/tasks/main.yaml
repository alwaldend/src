- tags:
    - vault
  block:
    - name: Install packages
      ansible.builtin.package:
        name:
          - gnupg2
          - cryptsetup
          - gnupg2-scdaemon
          - pcsc-lite
    - name: Create vault user
      ansible.builtin.user:
        name: "{{ vault_user }}"
        uid: "{{ vault_user_uid }}"
        shell: /sbin/nologin
        home: "{{ vault_dir }}/home"
        system: true
    - name: Create vault dirs
      loop:
        - "{{ vault_dir }}"
        - "{{ vault_data_dir }}"
        - "{{ vault_config_dir }}"
        - "{{ vault_log_dir }}"
        - "{{ vault_tls_dir }}"
      ansible.builtin.file:
        state: directory
        owner: "{{ vault_user }}"
        group: "{{ vault_user }}"
        mode: "0700"
        path: "{{ item }}"
    - name: Copy the vault binary
      register: vault_bin_var
      ansible.builtin.copy:
        src: "{{ vault_bin_local_path }}"
        dest: "{{ vault_bin_path }}"
        owner: "root"
        group: "{{ vault_user }}"
        mode: "0755"
    - name: Copy the config
      register: vault_config_var
      ansible.builtin.copy:
        src: "{{ vault_config_local_path }}"
        dest: "{{ vault_config_path }}"
        owner: "root"
        group: "{{ vault_user }}"
        mode: "0650"
    - name: Write the service
      register: vault_service_var
      ansible.builtin.template:
        src: systemd_service.conf
        dest: "{{ vault_service_path }}"
        owner: root
        group: root
        mode: 644
    - name: Ensure the daemon is reloaded
      when: vault_service_var.changed
      ansible.builtin.systemd_service:
        daemon_reload: true
    - name: Restart the service
      when: vault_service_var.changed or vault_config_var.changed or vault_bin_var.changed
      ansible.builtin.systemd_service:
        name: "{{ vault_service_path | basename }}"
        state: restarted
    - name: Start the service and enable
      ansible.builtin.systemd_service:
        name: "{{ vault_service_path | basename }}"
        enabled: true
        state: started
