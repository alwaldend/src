# https://github.com/MHSanaei/3x-ui/blob/main/x-ui.service.rhel
[Unit]
Description=x-ui Service
After=network.target
Wants=network.target

[Service]
EnvironmentFile={{ threexui_env_path }}
Type=simple
User={{ threexui_user }}
Group={{ threexui_user }}
WorkingDirectory={{ threexui_work_dir }}
ExecStart={{ threexui_bin_dir }}/x-ui
AmbientCapabilities=CAP_NET_ADMIN
ExecReload=/bin/kill -USR1 $MAINPID
Restart=on-failure
RestartSec=5s

[Install]
WantedBy=multi-user.target
