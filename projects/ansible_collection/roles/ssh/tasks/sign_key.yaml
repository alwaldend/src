- tags:
    - ssh_sign_key
  block:
    - name: Create temporary file
      register: ssh_public_key_tempfile
      ansible.builtin.tempfile:
        state: directory
        suffix: src_projects_ansible_collection_roles_ssh_sign_key_{{ ssh_public_key.path | basename }}
    - name: Copy public keys to the host
      ansible.builtin.fetch:
        src: "{{ ssh_public_key.path }}"
        dest: "{{ ssh_public_key_tempfile.path }}"
    - name: Sign keys
      connection: local
      register: ssh_sign_keys_cmd_result
      environment:
        VAULT_ADDR: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') }}"
        VAULT_CACERT: "{{ lookup('ansible.builtin.env', 'VAULT_CACERT') }}"
        VAULT_CLIENT_KEY: "{{ lookup('ansible.builtin.env', 'VAULT_CLIENT_KEY') }}"
        VAULT_CLIENT_CERT: "{{ lookup('ansible.builtin.env', 'VAULT_CLIENT_CERT') }}"
        VAULT_TOKEN: "{{ lookup('ansible.builtin.env', 'VAULT_TOKEN') }}"
        VAULT_SKIP_VERIFY: "{{ lookup('ansible.builtin.env', 'VAULT_SKIP_VERIFY') }}"
      ansible.builtin.command:
        argv:
          - "{{ role_path }}/files/vault"
          - write
          - -format=json
          - "{{ ssh_vault_mount }}/sign/{{ ssh_vault_role }}"
          - public_key=@{{ ssh_public_key_tempfile.path }}/{{ inventory_hostname }}/{{ ssh_public_key.path }}
          - cert_type=host
          - valid_principals={{ inventory_hostname }}
    - name: Copy signed public keys to the host
      ansible.builtin.copy:
        content: "{{ (ssh_sign_keys_cmd_result.stdout | from_json).data.signed_key }}\n"
        dest: "{{ ssh_public_key.path }}.signed"
        mode: "0644"
        owner: root
        group: root

