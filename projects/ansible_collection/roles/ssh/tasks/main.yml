- tags:
    - ssh
  block:
    - name: Install fail2ban packages
      ansible.builtin.package:
        name:
          - fail2ban
    - name: Start and enable fail2ban service
      ansible.builtin.systemd_service:
        name: fail2ban
        enabled: true
        state: started
    - name: Write CA for clients
      ansible.builtin.copy:
        src: ssh_ca_clients.pub
        dest: /etc/ssh/ca_clients.pem
        mode: "0640"
        owner: root
        group: root
    - name: Find public keys
      register: ssh_host_find_public_keys_result
      ansible.builtin.find:
        depth: 1
        paths:
          - /etc/ssh
        patterns:
          - ssh_host_*.pub
    - name: Sign public keys
      loop: "{{ ssh_host_find_public_keys_result.files }}"
      loop_control:
        loop_var: ssh_public_key
      ansible.builtin.include_tasks: sign_key.yaml
    - name: Harden ssh
      tags:
        - ssh_hardening
        - length_long
      ansible.builtin.include_role:
        name: devsec.hardening.ssh_hardening
      vars:
        ssh_trusted_user_ca_keys_file: /etc/ssh/ca_clients.pem
        ssh_host_certificates: "{{ ssh_host_find_public_keys_result.files | ansible.builtin.map(attribute='path') | ansible.builtin.map('ansible.builtin.regex_replace', '^(.*)$', '\\1.signed') }}"
