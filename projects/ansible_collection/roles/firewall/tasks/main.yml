- name: Setup firewall
  tags:
    - firewall
  when: firewall_enabled
  block:
    - name: Install ufw
      ansible.builtin.package:
        name: ufw
        state: present
    - name: Enable ufw
      community.general.ufw:
        state: "{{ firewall_state }}"
    - name: Enable ufw logging
      community.general.ufw:
        logging: low
    - name: Deny incoming connections
      community.general.ufw:
        default: deny
        direction: incoming
    - name: Allow outgoing connections
      community.general.ufw:
        default: allow
        direction: outgoing
    - name: Allow port
      loop: "{{ firewall_allow_port_from | list }}"
      community.general.ufw:
        rule: allow
        direction: in
        proto: "{{ item.proto | default('any') }}"
        port: "{{ item.port | mandatory }}"
        src: "{{ item.src | mandatory }}"
        comment: "{{ item.comment | mandatory }} # Ansible"
    - name: Allow forward
      loop: "{{ firewall_allow_forward | list }}"
      community.general.ufw:
        rule: allow
        route: true
        src: "{{ item.src | default('any') }}"
        dest: "{{ item.dest | default('any') }}"
        comment: "{{ item.comment | mandatory }} # Ansible"
    - name: Check if firewalld exists
      register: firewall_firewalld_stat
      ansible.builtin.stat:
        path: "/lib/systemd/system/firewalld.service"
    - name: Disable firewalld
      when: firewall_firewalld_stat.stat.exists
      ansible.builtin.systemd_service:
        name: "firewalld"
        enabled: false
        state: stopped
