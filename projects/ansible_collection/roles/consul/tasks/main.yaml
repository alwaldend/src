- tags:
    - consul
  block:
    - name: Install packages
      ansible.builtin.package:
        name:
          - gnupg2
          - cryptsetup
          - gnupg2-scdaemon
          - pcsc-lite
    - name: Create consul user
      ansible.builtin.user:
        name: "{{ consul_user }}"
        uid: "{{ consul_user_uid }}"
        shell: /sbin/nologin
        home: "{{ consul_dir }}/home"
        system: true
    - name: Create consul dirs
      loop:
        - "{{ consul_dir }}"
        - "{{ consul_data_dir }}"
        - "{{ consul_config_dir }}"
        - "{{ consul_log_dir }}"
        - "{{ consul_tls_dir }}"
      ansible.builtin.file:
        state: directory
        owner: "{{ consul_user }}"
        group: "{{ consul_user }}"
        mode: "0700"
        path: "{{ item }}"
    - name: Copy the consul binary
      register: consul_bin_var
      ansible.builtin.copy:
        src: "{{ consul_bin_local_path }}"
        dest: "{{ consul_bin_path }}"
        owner: "root"
        group: "{{ consul_user }}"
        mode: "0755"
    - name: Copy the config
      register: consul_config_var
      ansible.builtin.copy:
        src: "{{ consul_config_local_path }}"
        dest: "{{ consul_config_path }}"
        owner: "root"
        group: "{{ consul_user }}"
        mode: "0650"
    - name: Copy client ca file
      register: consul_tls_client_ca_file_path_var
      ansible.builtin.copy:
        src: "{{ consul_tls_client_ca_file_local_path }}"
        dest: "{{ consul_tls_client_ca_file_path }}"
        owner: "root"
        group: "{{ consul_user }}"
        mode: "0650"
    - name: Write the service
      register: consul_service_var
      ansible.builtin.template:
        src: systemd_service.conf
        dest: "{{ consul_service_path }}"
        owner: root
        group: root
        mode: 644
    - name: Ensure the daemon is reloaded
      when: consul_service_var.changed
      ansible.builtin.systemd_service:
        daemon_reload: true
    - name: Restart the service
      when: >-
        consul_service_var.changed
        or consul_config_var.changed or consul_bin_var.changed
        or consul_tls_client_ca_file_path_var.changed
      ansible.builtin.systemd_service:
        name: "{{ consul_service_path | basename }}"
        state: reloaded
    - name: Start the service and enable
      ansible.builtin.systemd_service:
        name: "{{ consul_service_path | basename }}"
        enabled: true
        state: started
