ansible_user: ansible
ssh_vault_role: src_infra_dc1_pve1_ssh

install_ca:
  - path: files/pki_ca_root.crt
  - path: files/pki_ca_servers.crt

pve_snippets:
  - src: cloud_init.yaml
  - src: cloud_init_min.yaml


## devsec.hardening.os_hardening
sysctl_overwrite:
  net.ipv4.ip_forward: 1
  net.ipv4.conf.all.proxy_arp: 1

## firewall
firewall_allow_forward:
  - dest: 192.168.10.0/24
    comment: Forwarding to VMs
  - src: 192.168.10.0/24
    comment: Forwarding from VMs
firewall_allow_port_from:
  - src: "any"
    port: 8006
    comment: Web traffic
  - src: "any"
    port: 80
    comment: ACME
  - src: "any"
    port: 22
    comment: ssh
