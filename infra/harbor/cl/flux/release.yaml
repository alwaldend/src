---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: harbor
spec:
  path: ./infra/harbor/cl/harbor
  interval: 60m0s
  wait: true
  timeout: 3m0s
  retryInterval: 2m0s
  prune: true
  force: false
  sourceRef:
    kind: GitRepository
    name: flux-git-src
  decryption:
    provider: sops
    secretRef:
      name: flux-sops-secret
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor-chart
spec:
  interval: 15m
  timeout: 10m
  targetNamespace: harbor
  chart:
    spec:
      chart: harbor
      # https://github.com/goharbor/harbor-helm/releases
      version: "1.19.1"
      sourceRef:
        kind: HelmRepository
        name: flux-helm-alwaldend
      interval: 10m
  releaseName: harbor
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  test:
    enable: true
  driftDetection:
    mode: enabled
  values:
    # https://github.com/goharbor/harbor-helm#configuration
    # https://goharbor.io/docs/2.15.0/install-config/harbor-ha-helm/
    externalURL: https://harbor.alwaldend.com
    persistence:
      persistentVolumeClaim:
        registry:
          storageClass: local-path
        jobservice:
          storageClass: local-path
        database:
          storageClass: local-path
        redis:
          storageClass: local-path
        trivy:
          storageClass: local-path
    caBundleSecretName: alwaldend-ca
