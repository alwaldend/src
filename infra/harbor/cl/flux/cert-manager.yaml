---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: src-infra-harbor-cl-cert-manager
spec:
  path: ./infra/harbor/cl/cert-manager
  targetNamespace: cert-manager
  sourceRef:
    kind: GitRepository
    name: flux-git-src
  decryption:
    provider: sops
    secretRef:
      name: flux-sops-secret
  interval: 60m0s
  wait: true
  timeout: 3m0s
  retryInterval: 2m0s
  prune: true
  force: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: src-infra-harbor-cl-cert-manager-flux
spec:
  path: ./projects/kustomization/cert-manager/flux
  targetNamespace: src-infra-harbor-cl
  sourceRef:
    kind: GitRepository
    name: flux-git-src
  decryption:
    provider: sops
    secretRef:
      name: flux-sops-secret
  interval: 60m0s
  wait: true
  timeout: 3m0s
  retryInterval: 2m0s
  prune: true
  force: false
---
