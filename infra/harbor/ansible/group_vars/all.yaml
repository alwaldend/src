ansible_user: ansible
ssh_vault_role: src_infra_harbor_ssh
ssh_allow_tcp_forwarding: local
k3s_kubeconfig_secret_mount: secrets
harbor_domain: harbor.alwaldend.com
ssh_valid_principals:
  - harbor.alwaldend.com
firewall_allow_port_from:
  - src: "any"
    port: 22
    comment: ssh
  - src: "any"
    port: 443
    comment: HTTPS
  - src: 192.168.10.60
    port: 6443
    comment: Kubeapi access for Fluxcd
