ansible_user: ansible
ssh_vault_role: src_infra_harbor_ssh
traefik_acme_path: pki/ica_servers/roles/src_infra_harbor_pki_server/acme
traefik_acme_url: "https://vault.dc1.alwaldend.com:8200/v1/{{ traefik_acme_path }}/directory"
harbor_domain: harbor.alwaldend.com

## firewall
firewall_allow_port_from:
  - src: "any"
    port: 22
    comment: ssh
  - src: "any"
    port: 443
    comment: HTTPS
  - src: "any"
    port: 80
    comment: HTTP
