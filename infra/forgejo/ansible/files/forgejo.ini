# https://forgejo.org/docs/latest/admin/config-cheat-sheet
APP_NAME = Forgejo
APP_SLOGAN = Git forge
RUN_USER = {{ forgejo_user }}
RUN_MODE = prod
WORK_PATH = {{ forgejo_work_dir }}

[log]
LEVEL = "Info"
MODE = console
ROOT_PATH = {{ forgejo_work_dir }}/log

[server]
PROTOCOL = http
HTTP_ADDR = 127.0.0.1
HTTP_PORT = 3000
DOMAIN = {{ forgejo_domain }}
ROOT_URL = https://{{ forgejo_domain }}/
START_SSH_SERVER = true
SSH_PORT = 3005
SSH_DOMAIN = forgejo.alwaldend.com
DISABLE_SSH = false
ENABLE_GZIP = true
LFS_START_SERVER = true
LFS_JWT_SECRET = {{ lookup('ansible.builtin.env', 'LFS_JWT_SECRET', default=undefined()) }}
APP_DATA_PATH = {{ forgejo_work_dir }}/data
OFFLINE_MODE = true

[repository.signing]
MERGES = always
CRUD_ACTIONS = always
DEFAULT_TRUST_MODEL = committer

[database]
DB_TYPE = sqlite3
HOST =
NAME =
USER =
PASSWD =
SCHEMA =
SSL_MODE = disable
PATH = {{ forgejo_work_dir }}/data/forgejo.db
LOG_SQL = false

[security]
INSTALL_LOCK = true
INTERNAL_TOKEN = {{ lookup('ansible.builtin.env', 'SECURITY_INTERNAL_TOKEN', default=undefined()) }}
PASSWORD_HASH_ALGO = pbkdf2_hi

[oauth2]
JWT_SECRET = {{ lookup('ansible.builtin.env', 'OAUTH2_JWT_SECRET', default=undefined()) }}

[oauth2_client]
OPENID_CONNECT_SCOPES = user groups email ssh
ENABLE_AUTO_REGISTRATION = true
ACCOUNT_LINKING = auto

[repository]
ROOT = {{ forgejo_work_dir }}/data/forgejo-repositories

[lfs]
PATH = {{ forgejo_work_dir }}/data/lfs

[mailer]
ENABLED = false

[service]
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = false
DISABLE_REGISTRATION = true
ALLOW_ONLY_EXTERNAL_REGISTRATION = false
ENABLE_CAPTCHA = false
REQUIRE_SIGNIN_VIEW = false
DEFAULT_KEEP_EMAIL_PRIVATE = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = true
NO_REPLY_ADDRESS = noreply.alwaldend.com

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[cron.update_checker]
ENABLED = true

[session]
PROVIDER = file

[repository.pull-request]
DEFAULT_MERGE_STYLE = merge
