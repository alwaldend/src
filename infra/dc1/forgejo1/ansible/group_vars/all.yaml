ansible_user: ansible
ssh_vault_role: src_infra_dc1_forgejo1_ssh

## firewall
## https://developer.hashicorp.com/forgejo/docs/reference/architecture/ports
firewall_allow_port_from:
  - src: "any"
    port: 22
    comment: ssh
  - src: "any"
    port: 443
    comment: HTTPS
  - src: "any"
    port: 80
    comment: HTTP
