ansible_user: ansible
ssh_vault_role: src_infra_dc1_forgejo1_ssh
traefik_acme_path: pki/ica_servers/roles/src_infra_dc1_forgejo1_pki_server/acme
traefik_acme_url: "https://vault.dc1.alwaldend.com:8200/v1/{{ traefik_acme_path }}/directory"
traefik_alt_names: forgejo1.dc1.alwaldend.com,host1.forgejo1.dc1.alwaldend.com

## firewall
## https://developer.hashicorp.com/forgejo/docs/reference/architecture/ports
firewall_allow_port_from:
  - src: "any"
    port: 22
    comment: ssh
  - src: "any"
    port: 443
    comment: HTTPS
  - src: "any"
    port: 80
    comment: HTTP
  - src: "any"
    port: 3005
    comment: Forgejo ssh
