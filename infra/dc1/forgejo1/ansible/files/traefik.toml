[global]
checkNewVersion = false
sendAnonymousUsage = false

[log]
level = "INFO"
filePath = "{{ traefik_log_dir }}/traefik.log"

[entryPoints]
[entryPoints.web]
address = ":80"

[entryPoints.websecure]
address = ":443"

# [api]
# dashboard = true
# insecure = true

[certificatesResolvers.vault.acme]
email = "src_infra_dc1_forgejo1@alwaldend.com"
storage = "{{ traefik_data_dir }}/acme_vault.json"
caServer = "{{ traefik_acme_url }}/dir"

[certificatesResolvers.vault.acme.httpChallenge]
entryPoint = "web"

[certificatesResolvers.vault.acme.eab]
kid = "{{ traefik_acme_kid }}"
hmacEncoded = "{{ traefik_acme_hmac_encoded }}"

[http.middlewares.redirect_https.redirectScheme]
scheme = "https"

[http.routers.forgejo_web]
rule = "Host(`{{ inventory_hostname }}`)"
entryPoints = ["web"]
middlewares = ["redirect_https"]

[http.routers.forgejo_websecure]
rule = "Host(`{{ inventory_hostname }}`)"
entryPoints = ["websecure"]
service = "forgejo"
tls = { certResolver = "vault" }

[http.services.forgejo.loadBalancer]
[[http.services.forgejo.loadBalancer.servers]]
url = "http://127.0.0.1:3000"
