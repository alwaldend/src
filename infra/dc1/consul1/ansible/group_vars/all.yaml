ansible_user: ansible
ssh_vault_role: src_infra_dc1_consul1_ssh
consul_tls_ca_file_local_path: files/pki_ca_servers.crt
consul_tls_issue_path: pki/ica_servers/issue/src_infra_dc1_consul1_pki_server
consul_tls_alt_names: consul1.dc1.alwaldend.com,server.dc1.consul

## firewall
## https://developer.hashicorp.com/consul/docs/reference/architecture/ports
firewall_allow_port_from:
  - src: "any"
    port: 22
    comment: ssh
  - src: "any"
    port: 8501
    comment: HTTPS
  - src: "any"
    port: 8503
    comment: GRPC
  - src: "any"
    port: 8600
    comment: DNS
  - src: "any"
    port: 8300
    comment: Server RPC
  - src: "any"
    port: 8301
    comment: Server RPC
  - src: "any"
    port: 8302
    comment: Server RPC
