ansible_user: ansible

lvol_volumes:
  - vg: fedora
    lv: vault
    opts: --mirrors 1
    size: "{{ 100 * 1024 }}"
filesystem_setup:
  - dev: /dev/fedora/vault
    resizefs: true
    fstype: ext4
mount_points:
  - path: /opt/vault
    src: /dev/fedora/vault
    fstype: ext4
    state: mounted

vault_dir: "/opt/vault"

## hardening
sysctl_overwrite:
  # k3s hardening: https://docs.k3s.io/security/hardening-guide#host-level-requirements
  vm.panic_on_oom: 0
  vm.overcommit_memory: 1
  kernel.panic: 10
  kernel.panic_on_oops: 1

## firewall
firewall_allow_port_from:
  - src: "any"
    port: 8200
    comment: Vault traffic
  - src: "any"
    port: 22
    comment: ssh
