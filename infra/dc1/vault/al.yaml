auth:
  - name: default
    approle:
      name: src_infra_dc1_vault
secrets:
  - name: tf_backend
    kv:
      path: alwaldend.com/vault1/approles/src_infra_dc1_vault/bucket
      mount: secrets
    files:
      - name: backend_config
        value: |
          bucket = "{{ .Secret.bucket }}"
    env:
      - name: AL_TF_BACKEND_CONFIG_1
        value: "{{ .Files.backend_config }}"
  - name: yc_auth
    kv:
      path: yandex.cloud/org1/folders/src-infra-dc1-vault/account_iam_key
      mount: secrets
    files:
      - name: service_account_key
        value: "{{ .Secret.service_account_key }}"
    env:
      - name: YC_CLOUD_ID
        value: "{{ .Secret.cloud_id }}"
      - name: TF_VAR_cloud_id
        value: "{{ .Secret.cloud_id }}"
      - name: YC_FOLDER_ID
        value: "{{ .Secret.folder_id }}"
      - name: TF_VAR_folder_id
        value: "{{ .Secret.folder_id }}"
      - name: YC_SERVICE_ACCOUNT_KEY_FILE
        value: "{{ .Files.service_account_key }}"
  - name: yc_bucket_auth
    kv:
      path: yandex.cloud/org1/folders/src-infra-dc1-vault/account_static_key
      mount: secrets
    env:
      - name: AWS_ACCESS_KEY_ID
        value: "{{ .Secret.access_key }}"
      - name: AWS_SECRET_ACCESS_KEY
        value: "{{ .Secret.secret_key }}"
  - name: yc_account
    kv:
      path: yandex.cloud/org1/folders/src-infra-dc1-vault/account
      mount: secrets
    env:
      - name: TF_VAR_service_account_id
        value: "{{ .Secret.service_account_id }}"
  - name: rclone_config
    kv:
      path: alwaldend.com/vault1/approles/src_infra_dc1_vault/backup_bucket
      mount: secrets
    files:
      - name: rclone_config
        value: |
          [remote]
          type = s3
          provider = AWS
          env_auth = true
          region = ru-central1
          endpoint = storage.yandexcloud.net
    env:
      - name: RCLONE_CONFIG
        value: "{{ .Files.rclone_config }}"
      - name: AL_VAULT_BACKUP_BUCKET
        value: "{{ .Secret.bucket }}"
