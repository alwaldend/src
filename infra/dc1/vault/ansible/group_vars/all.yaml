ansible_user: ansible
ssh_vault_role: src_infra_dc1_vault_ssh

gpg_users:
  - vault

lvol_volumes:
  - vg: fedora
    lv: vault
    opts: --mirrors 1
    size: "{{ 100 * 1024 }}"
filesystem_setup:
  - dev: /dev/fedora/vault
    resizefs: true
    fstype: ext4
mount_points:
  - path: /opt/vault
    src: /dev/fedora/vault
    fstype: ext4
    state: mounted

vault_dir: "/opt/vault"

## firewall
firewall_allow_port_from:
  - src: "any"
    port: 8200
    comment: Vault traffic
  - src: "any"
    port: 22
    comment: ssh
