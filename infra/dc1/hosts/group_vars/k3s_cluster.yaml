## k3s
k3s_install_environment:
  INSTALL_K3S_VERSION: v1.35.1+k3s1
k3s_manifests:
  cloudflare-secret:
    apiVersion: v1
    kind: Secret
    type: Opaque
    metadata:
      name: cert-manager-secret
      namespace: cert-manager
    data:
      CLOUDFLAREAPI_ACCOUNT_ID: "{{ lookup('ansible.builtin.env', 'CLOUDFLAREAPI_ACCOUNT_ID', default=undef()) | b64encode }}"
      CLOUDFLAREAPI_API_TOKEN: "{{ lookup('ansible.builtin.env', 'CLOUDFLAREAPI_API_TOKEN', default=undef()) | b64encode }}"
      LETSENCRYPT_EMAIL: "{{ lookup('ansible.builtin.env', 'LETSENCRYPT_EMAIL', default=undef()) | b64encode }}"
k3s_config:
  selinux: true
  tls-san:
    - "{{ inventory_hostname }}"
    - "cl1.dc1.alwaldend.com"
  token: "{{ lookup('ansible.builtin.env', 'COM_ALWALDEND_DC_RESIDENTIAL_CL1_K3S_TOKEN', default=undef()) }}"
  cluster-cidr: "10.42.0.0/16"
  service-cidr: "10.43.0.0/16"
  cluster-dns: 10.43.0.10
