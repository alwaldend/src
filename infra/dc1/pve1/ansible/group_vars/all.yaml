ansible_user: ansible
ssh_vault_role: dc1_pve1

install_ca:
  - path: root_ca.crt

pve_snippets:
  - src: cloud_init.yaml
  - src: cloud_init_min.yaml


## devsec.hardening.os_hardening
sysctl_overwrite:
  net.ipv4.ip_forward: 1
  net.ipv4.conf.enp2s0.proxy_arp: 1
  net.ipv6.conf.all.forwarding: 1

## firewall
firewall_allow_port_from:
  - src: "any"
    port: 8006
    comment: Web traffic
  - src: "any"
    port: 80
    comment: ACME
  - src: "any"
    port: 22
    comment: ssh
