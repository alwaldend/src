- name: Control plane
  hosts: threexui_control_plane
  force_handlers: true
  become: true
  tasks:
    - ansible.builtin.import_role:
        name: alwaldend.main.host
    - ansible.builtin.import_role:
        name: alwaldend.main.traefik
    - ansible.builtin.import_role:
        name: alwaldend.main.threexui
