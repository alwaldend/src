[global]
checkNewVersion = false
sendAnonymousUsage = false

[providers.file]
filename = "{{ traefik_dynamic_config_path }}"

[log]
level = "INFO"
# filePath = "{{ traefik_log_dir }}/traefik.log"

[entryPoints]
[entryPoints.web]
address = ":80"
[entryPoints.web.http.redirections.entryPoint]
to = "websecure"

[entryPoints.websecure]
address = ":443"
asDefault = true
[entryPoints.websecure.http.tls]
certResolver = "vault"

# [api]
# dashboard = true
# insecure = true

[certificatesResolvers.vault.acme]
email = "src_infra_threexui@alwaldend.com"
storage = "{{ traefik_data_dir }}/acme_vault.json"
caServer = "{{ traefik_acme_url }}"

[certificatesResolvers.vault.acme.httpChallenge]
entryPoint = "web"

{% if not traefik_disable_eab %}
[certificatesResolvers.vault.acme.eab]
kid = "{{ traefik_acme_kid }}"
hmacEncoded = "{{ traefik_acme_hmac }}"
{% endif %}

[tls.stores]
[tls.stores.default.acme]
resolver = "vault"
[tls.stores.default.acme.domain]
main = "{{ threexui_domain }}"
sans = ["{{ inventory_hostname }}"]

{% if traefik_disable_eab %}
{% for port in range(40000, 40300) %}
[entryPoints.inbound_{{ port }}_ipv4]
address = "{{ ansible_default_ipv4.address }}:{{ port }}"
http = { tls = { certResolver = "vault" }  }
[entryPoints.inbound_{{ port }}_ipv6]
address = "[{{ ansible_default_ipv6.address }}]:{{ port }}"
http = { tls = { certResolver = "vault" }  }
{% endfor %}
{% endif %}
