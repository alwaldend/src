ansible_user: ansible
ssh_vault_role: src_infra_threexui_ssh
traefik_acme_path: pki/ica_servers/roles/src_infra_threexui_pki_server/acme
traefik_acme_url: "https://vault.alwaldend.com:8200/v1/{{ traefik_acme_path }}/directory"
threexui_domain: threexui.alwaldend.com
threexui_disk: /dev/sdb
traefik_disk: /dev/sdc
ssh_valid_principals:
  - threexui.alwaldend.com

firewall_allow_port_from:
  - src: "any"
    port: 22
    comment: ssh
  - src: "any"
    port: 443
    comment: HTTPS
  - src: "any"
    port: 80
    comment: HTTP
