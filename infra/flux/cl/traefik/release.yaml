---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m0s
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  # https://github.com/orgs/traefik/packages/container/helm%2Ftraefik/versions
  url: oci://ghcr.io/traefik/helm/traefik
  ref:
    tag: 41.0.1
    digest: sha256:394b7c78c44f275f8562ab653b7cab8dc3014bc7af52220204fe4fd8251884ca
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 15m
  timeout: 5m
  targetNamespace: traefik
  chartRef:
    kind: OCIRepository
    name: traefik
  releaseName: traefik
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  test:
    enable: true
  driftDetection:
    mode: enabled
  values:
    # https://doc.traefik.io/traefik/setup/kubernetes/
    providers:
      kubernetesIngress:
        enabled: false
      kubernetesGateway:
        enabled: true
    log:
      level: INFO
    accessLog:
      enabled: true
    gateway:
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 443
          protocol: HTTPS
          namespacePolicy:
            from: All
          tls:
            mode: Terminate
            certificateRefs:
              - name: traefik-gateway-websecure-tls
---
