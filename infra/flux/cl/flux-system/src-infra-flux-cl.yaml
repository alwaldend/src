---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: src-infra-flux-cl
  namespace: flux-system
spec:
  path: ./infra/flux/cl
  sourceRef:
    kind: GitRepository
    name: src
  decryption:
    provider: sops
    secretRef:
      name: flux-sops-secret
  interval: 60m0s
  wait: true
  timeout: 3m0s
  retryInterval: 2m0s
  prune: true
  force: false
---
