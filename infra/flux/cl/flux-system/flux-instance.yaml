apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: 2.9.0
    registry: ghcr.io/fluxcd
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
    - image-reflector-controller
    - image-automation-controller
    - source-watcher
  cluster:
    type: kubernetes
    multitenant: false
    networkPolicy: true
    domain: cluster.local
  storage:
    class: local-path
    size: 5Gi
  kustomize:
    patches:
      # CA fix: https://github.com/fluxcd/flux2/discussions/2921
      - target:
          kind: Deployment
          name: source-controller
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/volumeMounts
            value:
              - name: vault-ca
                mountPath: /etc/ssl/certs/vault-ca.crt
                subPath: ca.crt
                readOnly: true
          - op: add
            path: /spec/template/spec/volumes
            value:
              - name: vault-ca
                secret:
                  secretName: vault-ca
