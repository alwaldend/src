---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: master
  secretRef:
    name: flux-system
  url: ssh://forgejo@forgejo.alwaldend.com:3005/alwaldend/src.git
  ignore: |
    /*
    !/infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  path: ./infra/flux/cl
  sourceRef:
    kind: GitRepository
    name: flux-system
  secretRef:
    name: vault-ca
  decryption:
    provider: sops
    secretRef:
      name: flux-sops-secret
  interval: 60m0s
  wait: true
  timeout: 3m0s
  retryInterval: 2m0s
  prune: true
  force: false
