---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: flux-web
  namespace: flux-system
spec:
  interval: 30m
  url: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    tag: 0.53.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
   name: flux-web
   namespace: flux-system
spec:
  interval: 30m
  releaseName: flux-web
  serviceAccountName: flux-operator
  chartRef:
    kind: OCIRepository
    name: flux-web
  values:
    fullnameOverride: flux-web
    installCRDs: false
    extraEnvs:
      - name: SSL_CERT_FILE
        value: /etc/flux-operator/certs/ca.crt
    extraVolumeMounts:
      - name: vault-ca
        mountPath: /etc/flux-operator/certs/ca.crt
        subPath: ca.crt
        readOnly: true
    extraVolumes:
      - name: vault-ca
        secret:
          secretName: vault-ca
    web:
      serverOnly: true
      config:
        baseURL: https://operator.flux.alwaldend.com
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            issuerURL: https://vault.alwaldend.com:8200/v1/identity/oidc/provider/src_infra_flux_provider
  valuesFrom:
    - kind: Secret
      name: oidc
      valuesKey: clientID
      targetPath: web.config.authentication.oauth2.clientID
    - kind: Secret
      name: oidc
      valuesKey: clientSecret
      targetPath: web.config.authentication.oauth2.clientSecret
---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  annotations:
    fluxcd.controlplane.io/reconcileTimeout: 5m
  finalizers:
    - fluxcd.controlplane.io/finalizer
  labels:
    app.kubernetes.io/instance: flux-operator
    app.kubernetes.io/name: flux-operator
  name: flux-operator
  namespace: flux-system
spec:
  inputs:
    - interval: 1h
      url: oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests
      tag: v0.53.0-1782987615
  wait: true
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: << inputs.provider.name >>
        namespace: << inputs.provider.namespace >>
      spec:
        interval: << inputs.interval | quote >>
        ref:
          tag: << inputs.tag | quote >>
        url: << inputs.url | quote >>
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: << inputs.provider.name >>
        namespace: << inputs.provider.namespace >>
      spec:
        commonMetadata:
          labels:
            app.kubernetes.io/instance: flux-operator
            app.kubernetes.io/name: flux-operator
        deletionPolicy: Orphan
        force: true
        interval: 24h
        patches:
          - patch: |-
              - op: replace
                path: "/spec/selector/matchLabels"
                value:
                  app.kubernetes.io/name: flux-operator
                  app.kubernetes.io/instance: flux-operator
              - op: replace
                path: "/spec/template/metadata/labels"
                value:
                  app.kubernetes.io/name: flux-operator
                  app.kubernetes.io/instance: flux-operator
              - op: add
                path: "/spec/template/spec/containers/0/env/-"
                value:
                  name: REPORTING_INTERVAL
                  value: "30s"
            target:
              kind: Deployment
        path: ./flux-operator
        prune: true
        retryInterval: 5m
        serviceAccountName: << inputs.provider.name >>
        sourceRef:
          kind: OCIRepository
          name: << inputs.provider.name >>
        timeout: 5m
        wait: true
---
