---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: flux-operator
spec:
  interval: 30m
  url: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    tag: 0.53.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
   name: flux-operator
spec:
  interval: 30m
  releaseName: flux-operator
  serviceAccountName: flux-operator
  chartRef:
    kind: OCIRepository
    name: flux-operator
  values:
    fullnameOverride: flux-operator
    extraEnvs:
      - name: SSL_CERT_FILE
        value: /etc/flux-operator/certs/ca.crt
    extraVolumeMounts:
      - name: vault-ca
        mountPath: /etc/flux-operator/certs/ca.crt
        subPath: ca.crt
        readOnly: true
    extraVolumes:
      - name: vault-ca
        secret:
          secretName: vault-ca
    web:
      config:
        baseURL: https://operator.flux.alwaldend.com
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            issuerURL: https://vault.alwaldend.com:8200/v1/identity/oidc/provider/src_infra_flux_provider
  valuesFrom:
    - kind: Secret
      name: oidc
      valuesKey: clientID
      targetPath: web.config.authentication.oauth2.clientID
    - kind: Secret
      name: oidc
      valuesKey: clientSecret
      targetPath: web.config.authentication.oauth2.clientSecret
