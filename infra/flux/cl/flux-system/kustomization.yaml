apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system
resources:
  - namespace.yaml
  - flux-operator.yaml
  - flux-instance.yaml
  - flux-operator-ingress.yaml
  - flux-rbac.yaml
secretGenerator:
  - name: vault-ca
    namespace: flux-system
    options:
      disableNameSuffixHash: true
    files:
      - ca.crt=../../../vault/tf/output/pki_ca_servers.crt
