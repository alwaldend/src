---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault
spec:
  vault:
    path: pki/ica_servers/issuer/default/sign/src_infra_flux_pki_server
    server: https://vault.alwaldend.com:8200
    caBundleSecretRef:
      key: ca.crt
      name: vault-ca
    auth:
      appRole:
        path: approle
        roleId: src_infra_flux_cluster
        secretRef:
          name: cert-manager-vault-approle
          key: secretId
---
