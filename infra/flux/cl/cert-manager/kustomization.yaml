apiVersion: kustomize.config.k8s.io/v1beta
kind: Kustomization
namespace: cert-manager
resources:
  - ../../../../projects/kustomization/cert-manager/remote
  - issuer-approle.yaml
patches:
  - target:
      kind: ClusterIssuer
      group: cert-manager.io
      version: v1
      name: vault
    patch: |
      - op: replace
        path: /spec/vault/path
        value: pki/ica_servers/issuer/default/sign/src_infra_flux_cluster
      - op: replace
        path: /spec/vault/auth/appRole/roleId
        value: src_infra_flux_cluster
