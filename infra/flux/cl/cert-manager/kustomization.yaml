apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager
resources:
  - namespace.yaml
  - release.yaml
  - issuer-approle.yaml
  - issuer.yaml
secretGenerator:
  - name: vault-ca
    options:
      disableNameSuffixHash: true
    files:
      - ca.crt=../../../vault/tf/output/pki_ca_servers.crt
