---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  type: oci
  interval: 10m0s
  url: oci://quay.io/jetstack/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 15m
  timeout: 5m
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "1.20.3"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
      interval: 5m
  releaseName: cert-manager
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  driftDetection:
    mode: warn
  values:
    crds:
      enabled: true
