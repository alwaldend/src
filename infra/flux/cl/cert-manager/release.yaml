---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m0s
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  # https://quay.io/repository/jetstack/charts/cert-manager?tab=tags
  url: oci://quay.io/jetstack/charts/cert-manager
  ref:
    tag: 1.20.3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 15m
  timeout: 5m
  targetNamespace: cert-manager
  chartRef:
    kind: OCIRepository
    name: cert-manager
  releaseName: cert-manager
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  test:
    enable: true
  driftDetection:
    mode: enabled
  values:
    config:
      enableGatewayAPI: true
    crds:
      enabled: true
