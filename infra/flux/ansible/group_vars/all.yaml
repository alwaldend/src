ansible_user: ansible
ssh_vault_role: src_infra_flux_ssh
k3s_kubeconfig_secret_path: "alwaldend.com/vault1/approles/src_infra_flux/kubeconfig"
ssh_allow_tcp_forwarding: local
k3s_kubeconfig_secret_mount: secrets
flux_domain: flux.alwaldend.com
ssh_valid_principals:
  - flux.alwaldend.com

firewall_allow_port_from:
  - src: "any"
    port: 22
    comment: ssh
  - src: "any"
    port: 443
    comment: HTTPS
  - src: "any"
    port: 80
    comment: HTTP
