jwt:
  - issuer:
      url: https://vault.alwaldend.com:8200/v1/identity/oidc/provider/src_infra_flux_cluster_provider
      audiences:
        - 51Bw8vtyWuoZIm45O7ug83SghbLCxwPE
      audienceMatchPolicy: MatchAny
    claimMappings:
      username:
        claim: username
        prefix: src_infra_vault_
      groups:
        claim: groups
        prefix: src_infra_vault_
