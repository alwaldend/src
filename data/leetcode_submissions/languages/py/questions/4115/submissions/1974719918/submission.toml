  Code = "class Solution:\n    def minimumDistance(self, nums: List[int]) -> int:\n        n = len(nums)\n        ans = n + 1\n\n        for i in range(n - 2):\n            for j in range(i + 1, n - 1):\n                if nums[i] != nums[j]:\n                    continue\n                for k in range(j + 1, n):\n                    if nums[j] == nums[k]:\n                        ans = min(ans, k - i)\n                        break\n\n        return -1 if ans == n + 1 else ans * 2"
