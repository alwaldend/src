  Code = "class Solution:\n    def findRotation(\n        self, mat: List[List[int]], target: List[List[int]]\n    ) -> bool:\n        n = len(mat)\n        # at most 4 rotations\n        for k in range(4):\n            # rotation operation\n            for i in range(n // 2):\n                for j in range((n + 1) // 2):\n                    (\n                        mat[i][j],\n                        mat[n - 1 - j][i],\n                        mat[n - 1 - i][n - 1 - j],\n                        mat[j][n - 1 - i],\n                    ) = (\n                        mat[n - 1 - j][i],\n                        mat[n - 1 - i][n - 1 - j],\n                        mat[j][n - 1 - i],\n                        mat[i][j],\n                    )\n\n            if mat == target:\n                return True\n        return False"
