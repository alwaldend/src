  Code = "class Solution:\n    def maximumAmount(self, coins: List[List[int]]) -> int:\n        n = len(coins[0])\n        dp = [[-inf] * 3 for _ in range(n + 1)]\n\n        dp[1] = [0] * 3\n        for row in coins:\n            for j, x in enumerate(row):\n                dp[j + 1][2] = max(\n                    dp[j][2] + x, dp[j + 1][2] + x, dp[j][1], dp[j + 1][1]\n                )\n                dp[j + 1][1] = max(\n                    dp[j][1] + x, dp[j + 1][1] + x, dp[j][0], dp[j + 1][0]\n                )\n                dp[j + 1][0] = max(dp[j][0], dp[j + 1][0]) + x\n\n        return dp[n][2]"
