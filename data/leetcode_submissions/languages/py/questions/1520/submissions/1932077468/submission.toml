  Code = "class Solution:\n    def numSteps(self, s: str) -> int:\n        N = len(s)\n\n        operations = 0\n        carry = 0\n        for i in range(N - 1, 0, -1):\n            digit = int(s[i]) + carry\n            if digit % 2 == 1:\n                operations += 2\n                carry = 1\n            else:\n                operations += 1\n\n        return operations + carry"
