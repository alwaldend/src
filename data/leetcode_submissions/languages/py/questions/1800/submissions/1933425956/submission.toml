  Code = "class Solution:\n    def concatenatedBinary(self, n: int) -> int:\n        cur = 0\n        mod = (10 ** 9) + 7\n        for i in range(1, n + 1):\n            cur_i = i\n            while cur_i > 0:\n                cur = (cur << 1)\n                cur_i //= 2\n            cur = (cur + i) % mod\n        return cur"
