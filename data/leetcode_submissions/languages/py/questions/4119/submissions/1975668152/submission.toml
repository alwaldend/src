  Code = "class Solution:\n    def minimumDistance(self, nums: List[int]) -> int:\n        n = len(nums)\n        nxt = [-1] * n\n        occur = {}\n        ans = n + 1\n\n        for i in range(n - 1, -1, -1):\n            if nums[i] in occur:\n                nxt[i] = occur[nums[i]]\n            occur[nums[i]] = i\n\n        for i in range(n):\n            second_pos = nxt[i]\n            if second_pos != -1:\n                third_pos = nxt[second_pos]\n                if third_pos != -1:\n                    ans = min(ans, third_pos - i)\n\n        return -1 if ans == n + 1 else ans * 2"
