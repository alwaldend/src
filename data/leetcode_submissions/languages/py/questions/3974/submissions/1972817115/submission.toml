  Code = "class Solution:\n    MOD = 10**9 + 7\n\n    def xorAfterQueries(self, nums: List[int], queries: List[List[int]]) -> int:\n        for l, r, k, v in queries:\n            for i in range(l, r + 1, k):\n                nums[i] = (nums[i] * v) % self.MOD\n\n        res = 0\n        for x in nums:\n            res ^= x\n\n        return res"
