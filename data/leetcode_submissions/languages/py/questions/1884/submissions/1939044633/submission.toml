  Code = "class Solution:\n    def minOperations(self, s: str) -> int:\n        if len(s) < 2:\n            return 0\n        prev1 = int(s[0])\n        prev2 = prev1 ^ 1\n        count1, count2 = 0, 1\n        for char in s[1:]:\n            cur = int(char)\n            if cur == prev1:\n                count1 += 1\n                prev1 = cur ^ 1\n            else:\n                prev1 = cur\n            if cur == prev2:\n                count2 += 1\n                prev2 = cur ^ 1\n            else:\n                prev2 = cur\n        return min(count1, count2)\n                "
