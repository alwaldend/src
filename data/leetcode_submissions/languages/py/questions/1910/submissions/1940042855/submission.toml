  Code = "class Solution:\n    def checkOnesSegment(self, s: str) -> bool:\n        found_1, cur_1 = False, False\n        for char in s:\n            if char == \"1\":\n                if found_1 and not cur_1:\n                    return False\n                elif not found_1:\n                    found_1 = True\n                    cur_1 = True\n            elif cur_1:\n                cur_1 = False\n        return True"
