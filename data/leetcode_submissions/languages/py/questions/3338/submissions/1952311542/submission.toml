  TitleSlug = "count-submatrices-with-top-left-element-and-sum-less-than-k"
  Code = "class Solution:\n    def countSubmatrices(self, grid: List[List[int]], k: int) -> int:\n        n, m = len(grid), len(grid[0])\n        cols = [0] * m\n        res = 0\n\n        for i in range(n):\n            row_sum = 0\n            for j in range(m):\n                cols[j] += grid[i][j]\n                row_sum += cols[j]\n                if row_sum <= k:\n                    res += 1\n\n        return res"
