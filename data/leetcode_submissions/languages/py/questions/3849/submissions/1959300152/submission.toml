  Code = "class Solution:\n    def canPartitionGrid(self, grid: List[List[int]]) -> bool:\n        m, n = len(grid), len(grid[0])\n        total = sum(sum(row) for row in grid)\n        \n        if total % 2:\n            return False\n        \n        target = total // 2\n        s = 0\n        \n        for i in range(m - 1):\n            s += sum(grid[i])\n            if s == target:\n                return True\n        \n        s = 0\n        \n        for j in range(n - 1):\n            for i in range(m):\n                s += grid[i][j]\n            if s == target:\n                return True\n        \n        return False"
