  Code = "class Solution:\n    def decodeCiphertext(self, encodedText: str, rows: int) -> str:\n        if rows == 1:\n            return encodedText\n\n        n = len(encodedText)\n        cols = n // rows\n        res = []\n\n        for c in range(cols):\n            r, j = 0, c\n            while r < rows and j < cols:\n                res.append(encodedText[r * cols + j])\n                r += 1\n                j += 1\n\n        return \"\".join(res).rstrip()"
