  Code = "class Solution:\n    def sortByBits(self, arr: List[int]) -> List[int]:\n        def find_weight(num):\n            weight = 0\n            \n            while num:\n                weight += 1\n                num &= (num - 1)\n            \n            return weight\n        \n        arr.sort(key = lambda num: (find_weight(num), num))\n        return arr"
