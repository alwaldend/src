  Code = "class Solution:\n    def numSpecial(self, mat: List[List[int]]) -> int:\n        m = len(mat)\n        n = len(mat[0])\n        row_count = [0] * m\n        col_count = [0] * n\n        ones = []\n        for row in range(m):\n            for col in range(n):\n                if mat[row][col] == 1:\n                    row_count[row] += 1\n                    col_count[col] += 1\n                    ones.append((row, col))\n        res = 0\n        while ones:\n            row, col = ones.pop()\n            if row_count[row] == 1 and col_count[col] == 1:\n                res += 1\n        return res"
