  Code = "class Solution:\n    def reverseSubmatrix(\n        self, grid: List[List[int]], x: int, y: int, k: int\n    ) -> List[List[int]]:\n        i0, i1 = x, x + k - 1\n        while i0 < i1:\n            for j in range(y, y + k):\n                grid[i0][j], grid[i1][j] = grid[i1][j], grid[i0][j]\n            i0, i1 = i0 + 1, i1 - 1\n        return grid"
