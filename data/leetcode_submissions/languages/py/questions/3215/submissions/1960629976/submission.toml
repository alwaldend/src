  Code = "class Solution:\n    def areSimilar(self, mat: List[List[int]], k: int) -> bool:\n        m, n = len(mat), len(mat[0])\n        for i in range(m):\n            is_even = i % 2 == 0\n            for j in range(n):\n                if is_even:\n                    new_j = (j - k) % n    \n                else:\n                    new_j = (j + k) % n\n                if mat[i][j] != mat[i][new_j]:\n                    return False\n        return True"
